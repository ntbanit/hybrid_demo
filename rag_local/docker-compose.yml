services:
  # ── PostgreSQL + pgvector ──────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init_pg.sql:/docker-entrypoint-initdb.d/init.sql

  # ── Elasticsearch ──────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  # ── Weaviate ───────────────────────────────────────────
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.24.6
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none   # we bring our own vectors
      ENABLE_MODULES: ""
    ports:
      - "8080:8080"
    volumes:
      - weaviate_data:/var/lib/weaviate

  # ── Apache Airflow ─────────────────────────────────────
  airflow-init:
    image: apache/airflow:2.9.1
    environment: &airflow_env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://rag:ragpass@postgres/airflow_db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: supersecretkey
    depends_on: [postgres]
    entrypoint: bash -c "airflow db migrate && airflow users create --username admin --password admin --role Admin --email a@a.com --firstname A --lastname B"
    volumes:
      - ./phase1-indexing/dags:/opt/airflow/dags
      - ./phase1-indexing/pipelines:/opt/airflow/pipelines
      - ./phase1-indexing/documents:/opt/airflow/documents

  airflow-webserver:
    image: apache/airflow:2.9.1
    environment: *airflow_env
    depends_on: [airflow-init]
    ports:
      - "8888:8080"
    command: webserver
    volumes:
      - ./phase1-indexing/dags:/opt/airflow/dags
      - ./phase1-indexing/pipelines:/opt/airflow/pipelines
      - ./phase1-indexing/documents:/opt/airflow/documents

  airflow-scheduler:
    image: apache/airflow:2.9.1
    environment: *airflow_env
    depends_on: [airflow-init]
    command: scheduler
    volumes:
      - ./phase1-indexing/dags:/opt/airflow/dags
      - ./phase1-indexing/pipelines:/opt/airflow/pipelines
      - ./phase1-indexing/documents:/opt/airflow/documents

volumes:
  pg_data:
  es_data:
  weaviate_data: